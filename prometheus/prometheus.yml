global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "express-app"
    static_configs:
      - targets: ["47.129.184.141:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["47.129.184.141:9100"]

  - job_name: "fastify-app"
    static_configs:
      - targets: ["47.129.184.141:3005"]

  - job_name: "fastify-app-optimasi"
    static_configs:
      - targets: ["47.129.184.141:3015"]

  - job_name: "express-app-optimasi"
    static_configs:
      - targets: ["47.129.184.141:3010"]

